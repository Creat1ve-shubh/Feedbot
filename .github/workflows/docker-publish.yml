name: Build, Push and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: shubh2047/feedbot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: [api, worker]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.service }}-latest
            type=raw,value=${{ matrix.service }}-${{ github.sha }}
            type=raw,value=${{ matrix.service }}-main,enable=${{ github.ref == 'refs/heads/main' }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-render:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API Deployment
        run: |
          if [ -n "${{ secrets.RENDER_API_DEPLOY_HOOK }}" ]; then
            echo "Triggering API Deploy Hook..."
            curl -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"
          else
            echo "RENDER_API_DEPLOY_HOOK secret is not set, skipping API deploy"
          fi

      - name: Trigger Render Worker Deployment
        run: |
          if [ -n "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}" ]; then
            echo "Triggering Worker Deploy Hook..."
            curl -X POST "${{ secrets.RENDER_WORKER_DEPLOY_HOOK }}"
          else
            echo "RENDER_WORKER_DEPLOY_HOOK secret is not set, skipping worker deploy"
          fi
